name: Python checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip pytest ruff
      - name: Compile Python
        run: python -m compileall custom_components/euskalmet
      - name: Ruff
        run: ruff check custom_components tests
      - name: Unit tests
        run: pytest
